<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>{{ module.label }}</title></head>
<body>
<h3>{{ module.label }}</h3>

<form id="searchForm">
  {% for field in module.widget.fields %}
    <label>{{ field.label }}
      {% if field.type == 'select' %}
        <select name="{{ field.name }}">
          <option value="">-- select --</option>
          {% for option in field.options %}
            <option value="{{ option }}">{{ option }}</option>
          {% endfor %}
        </select>
      {% else %}
        <input type="{{ 'number' if field.type == 'integer' or field.type == 'number' else 'text' }}"
               name="{{ field.name }}" />
      {% endif %}
    </label><br/>
  {% endfor %}
  <button type="submit">Search</button>
</form>

<script>
document.getElementById('searchForm').addEventListener('submit', function(e) {
  e.preventDefault();
  let params = new URLSearchParams();
  {% for field in module.widget.fields %}
    params.append('{{ field.name }}', document.getElementsByName('{{ field.name }}')[0].value);
  {% endfor %}
  let url = '{{ module.widget.queryTemplate }}';
  params.forEach((val, key) => { url = url.replace('{' + key + '}', encodeURIComponent(val)); });
  window.parent.postMessage({searchUrl: url}, '*');
});
</script>
</body>
</html>
